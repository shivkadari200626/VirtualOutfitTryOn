workflows:
  android-release:
    name: Build Release APK
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        GEMINI_API_KEY: $Default_GEMINI_API_KEY
        GROQ_API_KEY: $Default_GROQ_API_KEY
      java: 17
    scripts:
      - name: Set up JDK 17
        script: |
          java -version

      - name: Debug Keys
        script: |
          echo "=== GROQ KEY DEBUG ==="
          echo "Length: ${#GROQ_API_KEY}"
          echo "First 4: ${GROQ_API_KEY:0:4}..."
          echo "Last 4: ...${GROQ_API_KEY: -4}"

      - name: Regenerate Gradle Wrapper (Strong Fix)
        script: |
          # Remove old broken wrapper
          rm -rf gradle/wrapper/ gradlew gradlew.bat 2>/dev/null || true
          
          # Fix any line ending issues in project
          find . -name "gradlew" -exec sed -i '' 's/\r$//' {} \; 2>/dev/null || true
          
          # Regenerate wrapper
          ./gradlew wrapper --gradle-version 8.4 --distribution-type all || \
          gradle wrapper --gradle-version 8.4 --distribution-type all || true
          
          chmod +x gradlew

      - name: Build Release APK
        script: |
          ./gradlew assembleRelease --no-daemon --stacktrace

    artifacts:
      - app/build/outputs/apk/release/*.apk
