workflows:
  android-release:
    name: Build Release APK
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        GEMINI_API_KEY: $Default_GEMINI_API_KEY
        GROQ_API_KEY: $Default_GROQ_API_KEY
      java: 17
    scripts:
      - name: Set up JDK 17
        script: |
          java -version

      - name: Debug Environment Keys
        script: |
          echo "=== GROQ KEY DEBUG ==="
          echo "Length: ${#GROQ_API_KEY}"
          echo "First 4: ${GROQ_API_KEY:0:4}..."
          echo "Last 4: ...${GROQ_API_KEY: -4}"
          echo "====================="

      - name: Fix gradlew permissions + wrapper
        script: |
          sed -i 's/\r$//' gradlew || true
          chmod +x gradlew
          ./gradlew wrapper --gradle-version 8.4 --distribution-type all

      - name: Build Release APK
        script: |
          ./gradlew assembleRelease --no-daemon --stacktrace

    artifacts:
      - app/build/outputs/apk/release/*.apk

    # Enable this if you want AAB instead of APK
    # - name: Build Release AAB
    #   script: |
    #     ./gradlew bundleRelease --no-daemon --stacktrace
    # artifacts:
    #   - app/build/outputs/bundle/release/*.aab
