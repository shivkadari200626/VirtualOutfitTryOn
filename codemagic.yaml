workflows:
  android-release:
    name: Android Release
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      groups:
        - Default  # Your GROQ_API_KEY group
      android_signing:
        - VirtualOutfitTryOn  # Must match the name in Codemagic
    scripts:
      - name: Debug Groq Key
        script: |
          echo "=== KEY DEBUG ==="
          echo "Length: ${#Default_GROQ_API_KEY}"
      - name: Build
        script: ./gradlew assembleRelease  # <-- removed cd android
    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/*.aab
