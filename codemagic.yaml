workflows:
  android-release:
    name: Android Release
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      groups:
        - Default
      android_signing:
        - VirtualOutfitTryOn
    scripts:
      - name: Make gradlew executable
        script: chmod +x ./gradlew

      - name: Debug Groq Key
        script: |
          echo "=== KEY DEBUG ==="
          echo "Length: ${#Default_GROQ_API_KEY}"

      - name: Build
        script: ./gradlew --no-configuration-cache assembleRelease  --stacktrace# <-- FLAG MOVED HERE
    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/*.aab
