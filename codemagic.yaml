workflows:
  android-release:
    name: Build Release APK
        instance_type: linux_x2_large   # ← Change here
    max_build_duration: 60
    environment:
      vars:
        GEMINI_API_KEY: $Default_GEMINI_API_KEY
        GROQ_API_KEY: $Default_GROQ_API_KEY
      java: 17
    scripts:
      - name: Set up JDK 17
        script: |
          java -version

      - name: Debug Environment Keys
        script: |
          echo "=== GROQ KEY DEBUG ==="
          echo "Length: ${#GROQ_API_KEY}"
          echo "First 4: ${GROQ_API_KEY:0:4}..."
          echo "Last 4: ...${GROQ_API_KEY: -4}"
          echo "====================="

      - name: Fix gradlew + wrapper
        script: |
          # Universal line ending fix (works on macOS + Linux)
          if command -v dos2unix >/dev/null 2>&1; then
            dos2unix gradlew || true
          else
            sed -i 's/\r$//' gradlew 2>/dev/null || sed -i '' 's/\r$//' gradlew 2>/dev/null || true
          fi
          
          chmod +x gradlew
          
          # Ensure Gradle wrapper
          ./gradlew wrapper --gradle-version 8.4 --distribution-type all || true

      - name: Build Release APK
        script: |
          ./gradlew assembleRelease --no-daemon --stacktrace

    artifacts:
      - app/build/outputs/apk/release/*.apk
